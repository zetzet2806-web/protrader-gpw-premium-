<!DOCTYPE html>
<html lang="pl">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Strefa Premium</h1>
      <p class="subtitle">Tylko dla zalogowanych użytkowników.</p>
    </header>

    <main class="main">
      <section class="card">
        <h2>Plan sesji GPW</h2>

      <section class="card" style="margin-top:16px;">
        <h2>Sygnały / Alerty</h2>
        <p class="hint">Tu dodasz sygnały, momentum itd.</p>
      </section>

      <button class="logoutBtn" onclick="logoutUser()">Wyloguj</button>
    </main>

    <footer class="footer">
      Premium panel
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
